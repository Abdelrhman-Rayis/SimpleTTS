name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name mnfzacr7cbeb4

      - name: Build and Push
        run: |
          docker build -t mnfzacr7cbeb4.azurecr.io/mnfz:${{ github.sha }} -t mnfzacr7cbeb4.azurecr.io/mnfz:latest .
          docker push mnfzacr7cbeb4.azurecr.io/mnfz:${{ github.sha }}
          docker push mnfzacr7cbeb4.azurecr.io/mnfz:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name mnfz \
            --resource-group mnfz-rg \
            --image mnfzacr7cbeb4.azurecr.io/mnfz:${{ github.sha }}
